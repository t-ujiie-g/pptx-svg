# Deploy vanilla + React examples to GitHub Pages
name: Deploy static content to Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Build React example
      - name: Install React example dependencies
        working-directory: examples/react
        run: npm ci

      - name: Build React example
        working-directory: examples/react
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/react/
        run: npx vite build

      # Assemble site: vanilla at root, React at /react/
      - name: Assemble site
        run: |
          mkdir -p _site/react
          cp -r examples/vanilla/* _site/
          cp -r examples/react/dist/* _site/react/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
